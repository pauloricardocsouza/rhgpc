<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon Comercial GPC · Grupo Pinto Cerqueira -->
<!-- Quadrado navy arredondado + "GPC" branco + arco laranja característico do logo -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#2E476F"/>
  <text x="32" y="42"
        font-family="Archivo, Arial Black, sans-serif"
        font-size="22"
        font-weight="900"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-1.5">GPC</text>
  <!-- Arco laranja no canto superior direito (echo do logo principal) -->
  <path d="M 49 7 Q 57 9 58 16"
        stroke="#F58634"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>
</svg>
