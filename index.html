<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R2 People · Demo Visual · Sessões B2 e B3</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ========================================================================
     Variaveis
     ====================================================================== */
  :root {
    /* ============ GPC NAVY (escala completa derivada da logo · comercial v4.84) ============ */
    --gpc-navy-50:  #EEF2F8;
    --gpc-navy-100: #D8E0EE;
    --gpc-navy-200: #B0C0DC;
    --gpc-navy-300: #7691BC;
    --gpc-navy-400: #4D6FA0;
    --gpc-navy-500: #2E476F;
    --gpc-navy-600: #253C5E;
    --gpc-navy-700: #1B2D48;
    --gpc-navy-800: #131F31;
    --gpc-navy-900: #0B131F;

    /* ============ GPC ORANGE (escala derivada do acento) ============ */
    --gpc-orange-50:  #FFF2E8;
    --gpc-orange-100: #FFE0C6;
    --gpc-orange-200: #FCC18C;
    --gpc-orange-300: #F9A153;
    --gpc-orange-400: #F58634;
    --gpc-orange-500: #DC7529;
    --gpc-orange-600: #B45A1F;
    --gpc-orange-700: #8A4318;

    /* Aliases legados (compatibilidade) */
    --gpc-navy:      var(--gpc-navy-500);
    --gpc-navy-dark: var(--gpc-navy-800);
    --gpc-orange:    var(--gpc-orange-400);

    /* ============ Neutros com viés navy ============ */
    --n-0:   #FFFFFF;
    --n-50:  #F7F8FA;
    --n-100: #EFF1F5;
    --n-200: #E4E8EE;
    --n-300: #C9D0DA;
    --n-400: #9BA3B2;
    --n-500: #6B7280;
    --n-600: #4A5262;
    --n-700: #2C3340;
    --n-800: #16202E;
    --n-900: #0A0E16;

    /* ============ Aliases funcionais ============ */
    --bg: var(--n-50);
    --bg-elevated: var(--n-0);
    --bg-page: var(--n-50);
    --bg-sidebar: var(--n-0);                           /* sidebar agora é clara */
    --bg-sidebar-hover: var(--n-100);
    --bg-sidebar-active: var(--gpc-navy-50);

    --border: var(--n-200);
    --border-strong: var(--n-300);
    --border-dark: rgba(255,255,255,0.08);              /* legado · usado em alguns lugares */

    --text: var(--n-900);
    --text-dim: var(--n-600);
    --text-muted: var(--n-500);
    --text-faint: var(--n-400);
    --text-on-dark: #fafafa;
    --text-on-dark-muted: #A8B5C8;

    --accent: var(--gpc-navy-500);
    --accent-dim: var(--gpc-navy-600);
    --accent-deep: var(--gpc-navy-700);
    --accent-text: var(--gpc-navy-700);
    --accent-bg: var(--gpc-navy-50);

    --accent-blue: #1E5FBF;
    --accent-green: #109854;
    --accent-amber: var(--gpc-orange-400);
    --accent-red: #d92d20;

    --accent-amber-bg: var(--gpc-orange-50);
    --accent-green-bg: #E8F6EE;
    --accent-red-bg: #FDEBEA;
    --accent-blue-bg: #EAF1FD;

    --highlight: var(--gpc-orange-400);
    --highlight-text: var(--gpc-orange-600);
    --highlight-bg: var(--gpc-orange-50);

    /* ============ Spacing ============ */
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-7: 32px; --sp-8: 48px;

    /* ============ Radii ============ */
    --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-full: 9999px;
    --radius: var(--r-md);
    --radius-sm: var(--r-sm);

    /* ============ Shadows (tom navy ao invés de preto puro) ============ */
    --sh-xs: 0 1px 2px rgba(10,14,22,0.04);
    --sh-sm: 0 1px 3px rgba(10,14,22,0.06), 0 1px 2px rgba(10,14,22,0.04);
    --sh-md: 0 4px 12px rgba(10,14,22,0.06);
    --sh-lg: 0 8px 24px rgba(10,14,22,0.08);
    --shadow-sm: var(--sh-xs);
    --shadow: var(--sh-md);
    --shadow-lg: var(--sh-lg);

    /* ============ Layout ============ */
    --sidebar-w-expanded: 240px;
    --sidebar-w-collapsed: 64px;
    --topbar-h: 48px;                                   /* alinha com comercial (era 56px) */

    /* ============ Densidade ============ */
    --row-h: 36px;
    --row-pad-y: 9px;
    --row-pad-x: 12px;
    --card-pad: 18px;
    --kpi-pad: 18px;

    --font-display: 'Archivo', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-body: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; cursor: pointer; }

  /* ========================================================================
     Layout · Shell
     ====================================================================== */
  .shell {
    display: flex;
    min-height: 100vh;
  }

  /* ========================================================================
     Sidebar · Cofre design system (alinhado com comercial v4.84)
     Sidebar branca com logo GPC grande colorido no topo
     ====================================================================== */
  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    background: var(--bg-elevated);
    color: var(--text);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    width: var(--sidebar-w-expanded);
    transition: width 200ms ease-out;
    flex-shrink: 0;
  }
  .sidebar.collapsed { width: var(--sidebar-w-collapsed); }

  /* Brand block · logo grande colorido centralizado tipo comercial */
  .sidebar-header {
    padding: 20px 18px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; position: relative;
  }
  .sidebar.collapsed .sidebar-header { padding: 14px 8px; }

  .sidebar-brand {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; user-select: none; width: 100%;
  }
  .sidebar-brand-logo {
    height: 56px; width: auto; display: block; flex-shrink: 0;
    max-width: 80%;
  }
  .sidebar.collapsed .sidebar-brand-logo { height: 32px; max-width: 100%; }

  .sidebar-brand-text {
    display: flex; flex-direction: column; align-items: center;
    line-height: 1.1; gap: 3px;
  }
  .sidebar-brand-name {
    font-family: var(--font-body);
    font-weight: 700; font-size: 13px;
    color: var(--text); letter-spacing: -0.01em;
  }
  .sidebar-brand-sub {
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.18em;
    font-weight: 600;
  }
  .sidebar-brand-version {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text-faint);
    margin-top: 4px;
  }
  .sidebar.collapsed .sidebar-brand-text,
  .sidebar.collapsed .sidebar-brand-version { display: none; }

  /* Toggle posicionado absolutamente no topo direito */
  .sidebar-toggle {
    position: absolute; top: 8px; right: 8px;
    background: transparent; border: 0;
    color: var(--text-muted);
    width: 24px; height: 24px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 120ms; cursor: pointer;
  }
  .sidebar-toggle:hover { background: var(--bg); color: var(--text); }

  .sidebar-nav {
    flex: 1; overflow-y: auto;
    padding: 12px 8px;
  }

  .sidebar-section { margin-bottom: 14px; }
  .sidebar-section:last-child { margin-bottom: 0; }

  .sidebar-section-label {
    padding: 4px 12px 6px;
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--text-faint);
  }
  .sidebar.collapsed .sidebar-section-label { display: none; }
  .sidebar.collapsed .sidebar-section { margin-bottom: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .sidebar.collapsed .sidebar-section:first-child { padding-top: 0; border-top: 0; }

  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    margin: 1px 0;
    padding: 7px 10px 7px 12px;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    transition: all 120ms;
    position: relative; cursor: pointer;
  }
  .sidebar-item:hover { background: var(--bg); color: var(--text); }
  .sidebar-item.active {
    background: var(--accent-blue-bg);
    color: var(--accent);
    font-weight: 600;
  }
  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 6px; bottom: 6px;
    width: 3px;
    background: var(--accent-amber);
    border-radius: 2px;
  }

  .sidebar-item .icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.75; }
  .sidebar-item.active .icon { opacity: 1; }
  .sidebar-item .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar.collapsed .sidebar-item { justify-content: center; padding: 7px; }
  .sidebar.collapsed .sidebar-item .label { display: none; }
  .sidebar.collapsed .sidebar-item .badge-readonly { display: none; }
  .sidebar.collapsed .sidebar-item.readonly::after {
    content: '';
    position: absolute;
    bottom: 4px; right: 6px;
    width: 6px; height: 6px;
    background: var(--accent-amber);
    border-radius: 50%;
  }

  .sidebar-item .badge-readonly {
    width: 14px; height: 14px;
    color: var(--accent-amber);
    flex-shrink: 0;
  }
  .sidebar-item .badge-soon {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 8.5px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    background: var(--bg);
    color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sidebar.collapsed .sidebar-item .badge-soon { display: none; }

  /* Footer · DESENVOLVIDO POR R2 SOLUÇÕES (estilo comercial) */
  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 12px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .sidebar.collapsed .sidebar-footer { padding: 10px 6px; }

  .sidebar-r2-lbl {
    font-family: var(--font-mono);
    font-size: 8.5px; font-weight: 700;
    color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.14em;
    text-align: center;
  }
  .sidebar-r2-logo {
    height: 22px; width: auto; opacity: 0.75;
  }
  .sidebar.collapsed .sidebar-r2-lbl { display: none; }
  .sidebar.collapsed .sidebar-r2-logo { height: 16px; }

  /* Bloco antigo · ainda usado pelo JS de "Logado como" · mantém visível mas discreto */
  .sidebar-role-block {
    width: 100%;
    padding-top: 8px;
    margin-top: 4px;
    border-top: 1px dashed var(--border);
    font-size: 9.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
  }
  .sidebar-role-block .value {
    color: var(--text);
    font-family: var(--font-mono);
    margin-left: 4px;
    font-weight: 600;
  }
  .sidebar.collapsed .sidebar-role-block { display: none; }

  .sidebar-role-avatar {
    display: none;
    width: 28px; height: 28px;
    margin: 4px auto 0;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    align-items: center; justify-content: center;
  }
  .sidebar.collapsed .sidebar-role-avatar { display: flex; }

  /* ========================================================================
     Main · Topbar
     ====================================================================== */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .topbar {
    height: var(--topbar-h);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    gap: 16px;
    position: sticky; top: 0; z-index: 40;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .topbar-hamburger {
    width: 32px; height: 32px;
    background: transparent; border: 0;
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 120ms;
    flex-shrink: 0;
  }
  .topbar-hamburger:hover { background: var(--bg); color: var(--text); }
  .topbar-hamburger svg { width: 18px; height: 18px; }

  .topbar-title {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 8px;
    min-width: 0;
  }
  .topbar-title .sep {
    color: var(--text-faint);
    font-size: 14px;
    line-height: 1;
  }
  .topbar-title .crumb { color: var(--text); font-weight: 700; }

  .topbar-right { display: flex; gap: 8px; align-items: center; }

  .role-switcher {
    display: flex; gap: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 2px;
  }
  .role-switcher button {
    background: transparent;
    border: 0;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all 120ms;
  }
  .role-switcher button:hover { color: var(--text); }
  .role-switcher button.active {
    background: var(--bg-elevated);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .demo-banner {
    display: inline-flex;
    align-items: center; gap: 6px;
    background: var(--accent-amber-bg);
    color: #92400e;
    border: 1px solid #fcd34d;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ========================================================================
     Content
     ====================================================================== */
  .content { flex: 1; padding: 32px 40px; max-width: 1200px; width: 100%; }

  .page-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
  }
  .page-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 8px;
  }
  .page-eyebrow .sep { color: var(--text-faint); margin: 0 6px; }
  .page-title {
    margin: 0 0 6px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.15;
  }
  .page-title em {
    font-style: italic;
    font-weight: 800;
    color: var(--accent-amber);
  }
  /* Backward compatible com h1 sem .page-title */
  .page-header h1:not(.page-title) {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .page-subtitle, .page-header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ========================================================================
     Module Cards (B2)
     ====================================================================== */
  .modules-list { display: flex; flex-direction: column; gap: 8px; }

  .module-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 120ms;
  }
  .module-card:hover { border-color: var(--border-strong); }
  .module-card.expanded { box-shadow: var(--shadow-sm); }

  .module-header {
    display: flex; align-items: center;
    gap: 12px;
    padding: 14px 16px;
    width: 100%;
    background: transparent;
    border: 0;
    text-align: left;
    transition: background 120ms;
  }
  .module-header:hover { background: var(--bg); }

  .module-chevron {
    width: 16px; height: 16px;
    color: var(--text-faint);
    flex-shrink: 0;
    transition: transform 200ms;
  }
  .module-card.expanded .module-chevron { transform: rotate(90deg); }

  .module-icon {
    width: 36px; height: 36px;
    background: #f4f4f5;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: #52525b;
    flex-shrink: 0;
  }
  .module-icon svg { width: 18px; height: 18px; }

  .module-title-block { flex: 1; min-width: 0; }
  .module-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .module-title {
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
  }
  .module-code {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
  }
  .module-description {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .module-summary {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }

  .badge-core {
    background: var(--accent);
    color: white;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* details */
  .module-details {
    border-top: 1px solid var(--border);
    padding: 16px;
    background: #fafafa;
  }

  /* super_admin · stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .stat-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .stats-note {
    grid-column: 1 / -1;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* diretoria · scope blocks */
  .scope-block { margin-top: 12px; }
  .scope-block:first-child { margin-top: 0; }
  .scope-block-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .scope-list {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .scope-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-bottom: 1px solid #f4f4f5;
  }
  .scope-row:last-child { border-bottom: 0; }

  .scope-status { width: 16px; height: 16px; flex-shrink: 0; }
  .scope-status.active { color: var(--accent-green); }
  .scope-status.disabled { color: var(--accent-amber); }
  .scope-status.inactive { color: var(--text-faint); }
  .scope-status.core { color: var(--text-faint); }

  .scope-info { flex: 1; min-width: 0; }
  .scope-name { font-size: 13px; font-weight: 500; }
  .scope-code { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  .scope-actions { display: flex; gap: 4px; }

  .btn {
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 500;
    transition: all 120ms;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn:hover { border-color: var(--border-strong); background: #fafafa; }
  .btn.btn-activate { color: var(--accent-green); border-color: #bbf7d0; }
  .btn.btn-activate:hover { background: var(--accent-green-bg); }
  .btn.btn-reactivate { color: var(--accent-blue); border-color: #bfdbfe; }
  .btn.btn-reactivate:hover { background: var(--accent-blue-bg); }
  .btn.btn-deactivate { color: var(--text); }
  .btn.btn-danger {
    background: var(--accent-red);
    color: white;
    border-color: var(--accent-red);
  }
  .btn.btn-danger:hover { background: #b91c1c; border-color: #b91c1c; }
  .btn.btn-danger:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .scope-core-tag {
    font-size: 10px;
    color: var(--text-faint);
    font-style: italic;
    padding: 0 8px;
  }

  /* ========================================================================
     Modal
     ====================================================================== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 50;

   ========================================================================= */

function moduleIsActiveForUser(moduleCode, ctx) {
  if (ctx.role === 'super_admin') return true;
  const m = MODULES_CATALOG.find(x => x.code === moduleCode);
  if (m && m.is_core) return true;
  if (!ctx.tenant_id) return false;

  // Tenant scope
  if (ACTIVATIONS.some(a => a.code === moduleCode && a.scope_kind === 'tenant'
        && a.scope_id === ctx.tenant_id && !a.soft_disabled)) return true;
  // Employer
  if (ctx.employer_unit_id && ACTIVATIONS.some(a => a.code === moduleCode && a.scope_kind === 'employer_unit'
        && a.scope_id === ctx.employer_unit_id && !a.soft_disabled)) return true;
  // Working
  if (ctx.working_unit_id && ACTIVATIONS.some(a => a.code === moduleCode && a.scope_kind === 'working_unit'
        && a.scope_id === ctx.working_unit_id && !a.soft_disabled)) return true;

  return false;
}

function moduleIsReadonlyForUser(moduleCode, ctx) {
  if (ctx.role === 'super_admin') return false;
  const m = MODULES_CATALOG.find(x => x.code === moduleCode);
  if (m && m.is_core) return false;
  if (!ctx.tenant_id) return false;

  const hasDisabled = ACTIVATIONS.some(a => a.code === moduleCode && a.soft_disabled && (
    (a.scope_kind === 'tenant'        && a.scope_id === ctx.tenant_id) ||
    (a.scope_kind === 'employer_unit' && a.scope_id === ctx.employer_unit_id) ||
    (a.scope_kind === 'working_unit'  && a.scope_id === ctx.working_unit_id)
  ));
  if (!hasDisabled) return false;
  return !moduleIsActiveForUser(moduleCode, ctx);
}

  XCircle:    '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
  AlertTri:   '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  Lock:       '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  Chevron:    '<polyline points="9 18 15 12 9 6"/>',
};

function svgIcon(name, sizeClass = '') {
  const path = ICONS[name] || ICONS.Layers;
  return `<svg class="${sizeClass}" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}


/* ============================================================================
   Render · Sidebar
   ========================================================================= */

function renderSidebar() {
  const items = NAVBAR_BY_ROLE[currentRole] || [];
  const ctx = USER_CONTEXT[currentRole];

  // Filtrar itens conforme estado do módulo
  const visibleItems = [];
  for (const it of items) {
    if (!it.module_code) {
      visibleItems.push({ ...it, readonly: false });
    } else {
      const active   = moduleIsActiveForUser(it.module_code, ctx);
      const readonly = moduleIsReadonlyForUser(it.module_code, ctx);
      if (active)        visibleItems.push({ ...it, readonly: false });
      else if (readonly) visibleItems.push({ ...it, readonly: true });
      // senão omite
    }
  }

  // Agrupar por section preservando ordem
  const sections = [];
  const seen = {};
  for (const it of visibleItems) {
    if (!(it.section in seen)) { seen[it.section] = sections.length; sections.push({ name: it.section, items: [] }); }
    sections[seen[it.section]].items.push(it);
  }

  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = sections.map((s, idx) => `
    <div class="sidebar-section">
      <div class="sidebar-section-label">${SECTION_LABELS[s.name] || s.name}</div>
      ${s.items.map(it => `
        <a class="sidebar-item ${it.isCurrent ? 'active' : ''} ${it.readonly ? 'readonly' : ''}"
           href="${it.path}"
           title="${it.label}${it.readonly ? ' (somente leitura)' : it.path === '#' ? ' (em construção)' : ''}"
           ${it.path === '#' ? 'onclick="event.preventDefault()"' : ''}>
          ${svgIcon(it.icon, 'icon')}
          <span class="label">${it.label}</span>
          ${it.readonly ? '<span class="badge-readonly">' + svgIcon('Lock') + '</span>' : ''}
          ${it.path === '#' ? '<span class="badge-soon">em breve</span>' : ''}
        </a>
      `).join('')}
    </div>
  `).join('');

  // Footer
  document.getElementById('sidebarRole').textContent = currentRole;
  document.getElementById('sidebarRoleAvatar').textContent = currentRole.slice(0, 2).toUpperCase();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  // Vira o chevron
  const isCollapsed = sb.classList.contains('collapsed');
  document.getElementById('toggleIcon').innerHTML = isCollapsed
    ? '<path d="M9 18l6-6-6-6"/>'
    : '<path d="M15 18l-6-6 6-6"/>';
}


/* ============================================================================
   Render · página /admin/modulos (B2)
   ========================================================================= */

function getActivationState(code, scope_kind, scope_id) {
  const a = ACTIVATIONS.find(x => x.code === code && x.scope_kind === scope_kind && x.scope_id === scope_id);
  if (!a) return { active: false, disabled: false };
  return { active: !a.soft_disabled, disabled: a.soft_disabled };
}

function getGlobalView(code) {
  const tenantsActive = new Set(ACTIVATIONS.filter(a => a.code === code && a.scope_kind === 'tenant' && !a.soft_disabled).map(a => a.scope_id)).size;
  const tenantsDisabled = new Set(ACTIVATIONS.filter(a => a.code === code && a.scope_kind === 'tenant' && a.soft_disabled).map(a => a.scope_id)).size;
  const employerActive = ACTIVATIONS.filter(a => a.code === code && a.scope_kind === 'employer_unit' && !a.soft_disabled).length;
  const workingActive = ACTIVATIONS.filter(a => a.code === code && a.scope_kind === 'working_unit'  && !a.soft_disabled).length;
  const total = ACTIVATIONS.filter(a => a.code === code && !a.soft_disabled).length;
  return {
    tenants_total: TENANTS_TOTAL,
    tenants_active: tenantsActive,
    tenants_disabled: tenantsDisabled,
    employer_units_active: employerActive,
    working_units_active: workingActive,
    activations_total: total,
  };
}

function renderModulesList() {
  const subtitle = document.getElementById('pageSubtitle');
  const list = document.getElementById('modulesList');

  const isSuperAdmin = currentRole === 'super_admin';
  const isAdmin = isSuperAdmin || currentRole === 'diretoria';

  if (!isAdmin) {
    subtitle.textContent = 'Acesso restrito · apenas super_admin e diretoria.';
    list.innerHTML = `
      <div style="padding: 32px; text-align: center; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted);">
        <div style="display: inline-flex; width: 48px; height: 48px; background: var(--accent-red-bg); color: var(--accent-red); border-radius: 50%; align-items: center; justify-content: center; margin-bottom: 12px;">
          ${svgIcon('XCircle')}
        </div>
        <div style="font-weight: 600; color: var(--text); margin-bottom: 4px;">permission_denied</div>
        <div style="font-size: 12px;">Você está logado como <code style="font-family: var(--font-mono); background: var(--bg); padding: 1px 5px; border-radius: 3px;">${currentRole}</code>. Esta página é acessível apenas a super_admin e diretoria.</div>
        <div style="font-size: 11px; margin-top: 12px;">Use o seletor de papel acima para visualizar como super_admin ou diretoria.</div>
      </div>`;
    return;
  }

  subtitle.textContent = isSuperAdmin
    ? 'Visão global · todos os tenants'
    : 'Módulos disponíveis no seu tenant (Grupo Pinto Cerqueira)';

  list.innerHTML = MODULES_CATALOG.map(m => {
    const isExpanded = expandedModules.has(m.code);
    const summary = getSummaryFor(m, isSuperAdmin);
    return `
      <div class="module-card ${isExpanded ? 'expanded' : ''}" id="card-${m.code}">
        <button class="module-header" onclick="toggleModule('${m.code}')">
          <svg class="module-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          <span class="module-icon">${svgIcon(m.icon)}</span>
          <span class="module-title-block">
            <span class="module-title-row">
              <span class="module-title">${m.display_name}</span>
              ${m.is_core ? '<span class="badge-core">Core</span>' : ''}
              <span class="module-code">${m.code}</span>
            </span>
            <span class="module-description">${m.description}</span>
          </span>
          <span class="module-summary">${summary}</span>
        </button>
        ${isExpanded ? `
          <div class="module-details">
            ${isSuperAdmin ? renderSuperAdminPanel(m) : renderDiretoriaPanel(m)}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function getSummaryFor(m, isSuperAdmin) {
  if (isSuperAdmin) {
    const v = getGlobalView(m.code);
    return `${v.tenants_active}/${v.tenants_total} tenants · ${v.activations_total} ativações`;
  }
  // Diretoria
  const tenantState = getActivationState(m.code, 'tenant', TENANT_ID);
  const empActive = EMPLOYER_UNITS.filter(eu => getActivationState(m.code, 'employer_unit', eu.id).active).length;
  const wuActive  = WORKING_UNITS .filter(wu => getActivationState(m.code, 'working_unit', wu.id).active).length;
  const tag = tenantState.active ? 'Ativo no tenant' : tenantState.disabled ? 'Tenant em readonly' : 'Não ativado';
  return `${tag} · ${empActive} emp · ${wuActive} wu`;
}

function renderSuperAdminPanel(m) {
  const v = getGlobalView(m.code);
  const stats = [
    { label: 'Tenants total',          value: v.tenants_total },
    { label: 'Tenants ativos',         value: v.tenants_active },
    { label: 'Tenants em readonly',    value: v.tenants_disabled },
    { label: 'Employer units ativos',  value: v.employer_units_active },
    { label: 'Working units ativos',   value: v.working_units_active },
    { label: 'Total de ativações',     value: v.activations_total },
  ];
  return `
    <div class="stats-grid">
      ${stats.map(s => `
        <div class="stat-card">
          <div class="stat-value">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>
      `).join('')}
      <div class="stats-note">Para gerenciar ativações deste módulo, troque para <code style="background: var(--bg); padding: 1px 4px; border-radius: 3px;">diretoria</code> no seletor acima e veja a visão tenant-scoped.</div>
    </div>
  `;
}

function renderDiretoriaPanel(m) {
  const tenantState = getActivationState(m.code, 'tenant', TENANT_ID);

  let html = '<div class="scope-block">';
  html += `<div class="scope-block-title">Tenant (toda a organização)</div>`;
  html += `<div class="scope-list">`;
  html += renderScopeRow({
    name: 'Ativação no nível do tenant',
    code: '',
    state: tenantState,
    isCore: m.is_core,
    moduleCode: m.code,
    scopeKind: 'tenant',
    scopeId: TENANT_ID,
    moduleName: m.display_name,
    label: 'Tenant inteiro',
  });
  html += `</div></div>`;

  html += '<div class="scope-block">';
  html += `<div class="scope-block-title">Employer Units (${EMPLOYER_UNITS.length})</div>`;
  html += `<div class="scope-list">`;
  html += EMPLOYER_UNITS.map(eu => renderScopeRow({
    name: eu.name,
    code: eu.code,
    state: getActivationState(m.code, 'employer_unit', eu.id),
    isCore: m.is_core,
    moduleCode: m.code,
    scopeKind: 'employer_unit',
    scopeId: eu.id,
    moduleName: m.display_name,
    label: eu.name,
  })).join('');
  html += `</div></div>`;

  html += '<div class="scope-block">';
  html += `<div class="scope-block-title">Working Units (${WORKING_UNITS.length})</div>`;
  html += `<div class="scope-list">`;
  html += WORKING_UNITS.map(wu => renderScopeRow({
    name: wu.name,
    code: wu.code,
    state: getActivationState(m.code, 'working_unit', wu.id),
    isCore: m.is_core,
    moduleCode: m.code,
    scopeKind: 'working_unit',
    scopeId: wu.id,
    moduleName: m.display_name,
    label: wu.name,
  })).join('');
  html += `</div></div>`;

  return html;
}

function renderScopeRow(r) {
  let statusIcon, statusClass, action;
  if (r.isCore) {
    statusIcon = svgIcon('Lock'); statusClass = 'core';
    action = `<span class="scope-core-tag">core · sempre ativo</span>`;
  } else if (r.state.active) {
    statusIcon = svgIcon('CheckCircle'); statusClass = 'active';
    action = `<button class="btn btn-deactivate" onclick="requestDeactivate('${r.moduleCode}','${r.scopeKind}','${r.scopeId}','${r.label.replace(/'/g, "\\'")}','${r.moduleName.replace(/'/g, "\\'")}')">Desativar</button>`;
  } else if (r.state.disabled) {
    statusIcon = svgIcon('AlertTri'); statusClass = 'disabled';
    action = `<button class="btn btn-reactivate" onclick="reactivate('${r.moduleCode}','${r.scopeKind}','${r.scopeId}')">Reativar</button>`;
  } else {
    statusIcon = svgIcon('XCircle'); statusClass = 'inactive';
    action = `<button class="btn btn-activate" onclick="activate('${r.moduleCode}','${r.scopeKind}','${r.scopeId}')">Ativar</button>`;
  }
  return `
    <div class="scope-row">
      <span class="scope-status ${statusClass}">${statusIcon}</span>
      <div class="scope-info">
        <div class="scope-name">${r.name}</div>
        ${r.code ? `<div class="scope-code">${r.code}</div>` : ''}
      </div>
      <div class="scope-actions">${action}</div>
    </div>
  `;
}


/* ============================================================================
   Ações · activate / deactivate / reactivate
   ========================================================================= */

function activate(code, scope_kind, scope_id) {
  const existing = ACTIVATIONS.find(a => a.code === code && a.scope_kind === scope_kind && a.scope_id === scope_id);
  if (existing) {
    existing.soft_disabled = false;
  } else {
    ACTIVATIONS.push({ code, scope_kind, scope_id, soft_disabled: false });
  }
  rerender();
}

function reactivate(code, scope_kind, scope_id) {
  const a = ACTIVATIONS.find(x => x.code === code && x.scope_kind === scope_kind && x.scope_id === scope_id);
  if (a) a.soft_disabled = false;
  rerender();
}

function requestDeactivate(code, scope_kind, scope_id, label, moduleName) {
  pendingDeactivation = { code, scope_kind, scope_id, label, moduleName };
  showDeactivateModal();
}


/* ============================================================================
   Modal · deactivate
   ========================================================================= */

function getImpactSummary(code) {
  // Mock de impacto · simula contadores que viriam do banco
  const impacts = [];
  if (code === 'ninebox') {
    impacts.push({ kind: 'ninebox_open_evaluations', label: 'Avaliações 9-Box em andamento', count: 12 });
    impacts.push({ kind: 'ninebox_active_cycles',    label: 'Ciclos 9-Box abertos',           count: 1  });
    impacts.push({ kind: 'ninebox_snapshots',        label: 'Snapshots históricos (preservados)', count: 47 });
  } else if (code === 'recognition') {
    impacts.push({ kind: 'recognition_visible_posts', label: 'Reconhecimentos visíveis no feed', count: 89 });
  } else if (code === 'pdi') {
    impacts.push({ kind: 'pdi_active_plans', label: 'Planos PDI em andamento', count: 23 });
  } else if (code === 'onboarding') {
    impacts.push({ kind: 'onboarding_active_journeys', label: 'Jornadas de onboarding ativas', count: 7 });
  } else if (code === 'climate') {
    impacts.push({ kind: 'climate_open_surveys', label: 'Pesquisas de clima abertas', count: 0 });
  }
  impacts.push({ kind: 'users_affected', label: 'Usuários ativos no escopo', count: 234 });
  return impacts;
}

function showDeactivateModal() {
  const p = pendingDeactivation;
  const impacts = getImpactSummary(p.code);

  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-icon">${svgIcon('AlertTri')}</div>
      <div class="modal-title-block">
        <h2 class="modal-title">Desativar ${p.moduleName}?</h2>
        <p class="modal-subtitle">Escopo: ${p.label}</p>
      </div>
    </div>

    <div class="alert-box">
      <strong>Atenção:</strong> ao desativar, todos os dados ficam em modo somente leitura.
      Avaliações em andamento são bloqueadas para edição, novos registros não podem ser criados.
      Você pode reativar a qualquer momento sem perda de dados.
    </div>

    <div class="form-group">
      <label class="form-label">Dados afetados no escopo</label>
      <ul class="impact-list">
        ${impacts.map(i => `
          <li class="impact-row">
            <span>${i.label}</span>
            <span class="count ${i.count === 0 ? 'zero' : 'warn'}">${i.count}</span>
          </li>
        `).join('')}
      </ul>
    </div>

    <div class="form-group">
      <label class="form-label" for="reasonInput">Motivo (opcional)</label>
      <textarea id="reasonInput" class="form-textarea" rows="2" placeholder="Ex: reorganização, fim do período de avaliação..."></textarea>
    </div>

    <label class="consent">
      <input type="checkbox" id="consentCheck" onchange="document.getElementById('confirmBtn').disabled = !this.checked" />
      <span class="consent-text">
        Entendo que após a desativação os dados ficarão em modo somente leitura
        até a reativação do módulo.
      </span>
    </label>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="confirmBtn" disabled onclick="confirmDeactivate()">Desativar módulo</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingDeactivation = null;
}

function confirmDeactivate() {
  const p = pendingDeactivation;
  if (!p) return;
  const existing = ACTIVATIONS.find(a => a.code === p.code && a.scope_kind === p.scope_kind && a.scope_id === p.scope_id);
  if (existing) {
    existing.soft_disabled = true;
  } else {
    ACTIVATIONS.push({ code: p.code, scope_kind: p.scope_kind, scope_id: p.scope_id, soft_disabled: true });
  }
  closeModal();
  rerender();
}


/* ============================================================================
   Util · troca de papel + rerender geral
   ========================================================================= */

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('#roleSwitcher button').forEach(b => {
    b.classList.toggle('active', b.dataset.role === role);
  });
  rerender();
}

function toggleModule(code) {
  if (expandedModules.has(code)) expandedModules.delete(code);
  else expandedModules.add(code);
  renderModulesList();
}

function rerender() {
  renderSidebar();
  renderModulesList();
}


/* ============================================================================
   Boot
   ========================================================================= */

rerender();
</script>

</body>
</html>
